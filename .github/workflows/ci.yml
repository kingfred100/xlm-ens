name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  issues: write

jobs:
  changelog:
    name: Changelog Check
    runs-on: ubuntu-latest
    # Only run on pull requests — push to main is exempt (the PR already passed).
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch enough history to compute the merge-base against the target branch.
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Run changelog check
        env:
          # PRs labelled 'changelog-exempt' skip the requirement.
          CHANGELOG_EXEMPT: ${{ contains(github.event.pull_request.labels.*.name, 'changelog-exempt') }}
        run: |
          BASE=$(git merge-base origin/${{ github.base_ref }} HEAD)
          bash scripts/check-changelog.sh "$BASE"

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable && rustup component add rustfmt
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable && rustup component add clippy
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Workspace Tests
    runs-on: ubuntu-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev libudev-dev jq
      - name: Install Soroban CLI (optional but useful for integration tests)
        run: cargo install --locked soroban-cli || true
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Run tests with nextest
        # Use the 'ci' profile defined in .config/nextest.toml
        run: cargo nextest run --workspace --profile ci
      - name: Publish test report
        uses: dorny/test-reporter@v1
        # Run this step even if tests fail to report the results.
        if: success() || failure()
        with:
          name: Test Results
          path: target/nextest/ci/junit.xml
          reporter: java-junit
      - name: Verify snapshot files are unchanged
        if: always()
        run: bash ./scripts/check-snapshots.sh tests/test_snapshots

  artifacts:
    name: Contract Artifacts (WASM + spec)
    runs-on: ubuntu-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v4
      - name: Download latest main-branch WASM size baseline
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          branch: main
          name: contract-size-history
          path: .ci/main-size-baseline
          if_no_artifact_found: warn
      - name: Install Rust
        run: rustup update stable && rustup target add wasm32v1-none
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev libudev-dev jq
      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli
      - name: Build contracts
        # Fails clearly if any contract stops building for release output.
        run: |
          cargo build --release --target wasm32v1-none \
            -p xlm-ns-registry \
            -p xlm-ns-registrar \
            -p xlm-ns-resolver \
            -p xlm-ns-auction \
            -p xlm-ns-subdomain \
            -p xlm-ns-nft \
            -p xlm-ns-bridge
      - name: Verify WASM outputs exist
        run: |
          for crate in xlm_ns_registry xlm_ns_registrar xlm_ns_resolver xlm_ns_auction xlm_ns_subdomain xlm_ns_nft xlm_ns_bridge; do
            wasm="target/wasm32v1-none/release/${crate}.wasm"
            if [ ! -f "$wasm" ]; then
              echo "ERROR: expected WASM output not found: $wasm" >&2
              exit 1
            fi
            echo "OK: $wasm ($(wc -c < "$wasm") bytes)"
          done
      - name: Check contract WASM size budget
        id: wasm_size_budget
        continue-on-error: true
        run: ./scripts/check-contract-size.sh
      - name: Record WASM size trend and enforce early-warning threshold
        id: wasm_size_trend
        continue-on-error: true
        run: >
          ./scripts/track-contract-size.sh
          .github/contract-size-budget.json
          target/wasm32v1-none/release
          .ci/main-size-baseline/contract-sizes.json
      - name: Collect artifacts
        run: |
          mkdir -p artifacts/wasm artifacts/specs
          cp target/wasm32v1-none/release/xlm_ns_*.wasm artifacts/wasm/
          cp artifacts/contract-size-report.md artifacts/ 2>/dev/null || true
          cp artifacts/contract-size-trend.md artifacts/ 2>/dev/null || true

          # Generate contract specs for each WASM
          for wasm in artifacts/wasm/*.wasm; do
            base="$(basename "${wasm%.wasm}")"
            stellar contract info interface --wasm "$wasm" --output json > "artifacts/specs/${base}.json"
          done
      - name: Verify SDK bindings against contract specs
        run: scripts/check-sdk-bindings.sh artifacts/specs
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soroban-contract-artifacts-${{ github.sha }}
          path: artifacts
          # Retain artifacts for 90 days so deployment and verification workflows
          # can consume reproducible WASM outputs long after the build completes.
          retention-days: 90
      - name: Upload contract size history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-size-history
          path: artifacts/contract-sizes.json
          retention-days: 90
      - name: Comment WASM size trend on pull request
        if: ${{ always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- contract-size-trend -->';
            const body = fs.readFileSync('artifacts/contract-size-trend.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
      - name: Fail for a WASM budget or early-warning threshold breach
        if: steps.wasm_size_budget.outcome == 'failure' || steps.wasm_size_trend.outcome == 'failure'
        run: exit 1
