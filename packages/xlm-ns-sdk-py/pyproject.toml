[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "xlm-ns-sdk"
version = "0.1.0"
description = "Typed Python SDK for xlm-ens Soroban contracts"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Soroban-Ens" }]
dependencies = [
  "pandas>=2.0",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.5"]
notebooks = ["jupyter>=1.0", "matplotlib>=3.8"]

[project.urls]
Homepage = "https://github.com/Soroban-Ens/xlm-ens"
Repository = "https://github.com/Soroban-Ens/xlm-ens"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

